name: 'Setup wfctl'
description: 'Install the wfctl CLI tool for workflow engine operations'
inputs:
  version:
    description: 'wfctl version to install (e.g., "v0.3.51", "latest")'
    required: false
    default: 'latest'
  token:
    description: 'GitHub token for downloading releases'
    required: false
    default: ${{ github.token }}
  install-dir:
    description: 'Directory to install wfctl into. When set, sudo is not used and the directory is appended to GITHUB_PATH. Defaults to /usr/local/bin (existing behavior).'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Determine version
      id: version
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        if [ "${{ inputs.version }}" = "latest" ]; then
          auth_args=()
          if [ -n "${GH_TOKEN}" ]; then
            auth_args=(-H "Authorization: Bearer ${GH_TOKEN}")
          fi
          VERSION=$(curl -fsSL "${auth_args[@]}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/GoCodeAlone/workflow/releases/latest |
            sed -n 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' |
            head -n 1)
        else
          VERSION="${{ inputs.version }}"
        fi
        if [ -z "${VERSION}" ]; then
          echo "::error::Unable to resolve wfctl version from GoCodeAlone/workflow releases" >&2
          exit 1
        fi
        echo "Resolved wfctl version: ${VERSION}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
    - name: Determine OS and arch
      id: platform
      shell: bash
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac
        echo "os=${OS}" >> "$GITHUB_OUTPUT"
        echo "arch=${ARCH}" >> "$GITHUB_OUTPUT"
    - name: Resolve install directory
      id: install
      shell: bash
      run: |
        if [ -n "${{ inputs.install-dir }}" ]; then
          INSTALL_DIR="${{ inputs.install-dir }}"
          mkdir -p "${INSTALL_DIR}"
          echo "install_dir=${INSTALL_DIR}" >> "$GITHUB_OUTPUT"
          echo "use_sudo=false" >> "$GITHUB_OUTPUT"
        else
          echo "install_dir=/usr/local/bin" >> "$GITHUB_OUTPUT"
          echo "use_sudo=true" >> "$GITHUB_OUTPUT"
        fi
    - name: Resolve cache path
      id: cache-path
      shell: bash
      run: |
        CACHE_ROOT="${RUNNER_TOOL_CACHE:-${RUNNER_TEMP}}/setup-wfctl"
        CACHE_DIR="${CACHE_ROOT}/${{ steps.version.outputs.version }}/${{ steps.platform.outputs.os }}-${{ steps.platform.outputs.arch }}"
        echo "dir=${CACHE_DIR}" >> "$GITHUB_OUTPUT"
        echo "bin=${CACHE_DIR}/wfctl" >> "$GITHUB_OUTPUT"
    - name: Cache wfctl
      uses: actions/cache@v5
      id: cache
      with:
        path: ${{ steps.cache-path.outputs.dir }}
        key: wfctl-${{ steps.version.outputs.version }}-${{ steps.platform.outputs.os }}-${{ steps.platform.outputs.arch }}
    - name: Download wfctl
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        VERSION="${{ steps.version.outputs.version }}"
        OS="${{ steps.platform.outputs.os }}"
        ARCH="${{ steps.platform.outputs.arch }}"
        CACHE_DIR="${{ steps.cache-path.outputs.dir }}"
        CACHE_BIN="${{ steps.cache-path.outputs.bin }}"
        # Release assets use hyphen separators and are bare binaries (no .tar.gz)
        ASSET="wfctl-${OS}-${ARCH}"
        URL="https://github.com/GoCodeAlone/workflow/releases/download/${VERSION}/${ASSET}"
        CHECKSUMS_URL="https://github.com/GoCodeAlone/workflow/releases/download/${VERSION}/checksums.txt"
        echo "Downloading wfctl ${VERSION} for ${OS}/${ARCH}..."
        auth_args=()
        if [ -n "${GH_TOKEN}" ]; then
          auth_args=(-H "Authorization: token ${GH_TOKEN}")
        fi
        curl -fsSL "${auth_args[@]}" "${CHECKSUMS_URL}" -o /tmp/wfctl-checksums.txt
        expected_sha="$(awk -v asset="${ASSET}" '$2 == asset {print $1}' /tmp/wfctl-checksums.txt)"
        if [ -z "${expected_sha}" ]; then
          echo "::error::checksums.txt does not list ${ASSET} for ${VERSION}" >&2
          exit 1
        fi
        curl -fsSL "${auth_args[@]}" "${URL}" -o /tmp/wfctl
        if command -v sha256sum >/dev/null 2>&1; then
          actual_sha="$(sha256sum /tmp/wfctl | awk '{print $1}')"
        else
          actual_sha="$(shasum -a 256 /tmp/wfctl | awk '{print $1}')"
        fi
        if [ "${actual_sha}" != "${expected_sha}" ]; then
          echo "::error::wfctl checksum mismatch for ${ASSET}: expected ${expected_sha}, got ${actual_sha}" >&2
          exit 1
        fi
        echo "Verified wfctl ${VERSION} ${ASSET} sha256:${actual_sha}"
        mkdir -p "${CACHE_DIR}"
        mv /tmp/wfctl "${CACHE_BIN}"
        chmod +x "${CACHE_BIN}"
    - name: Install wfctl
      shell: bash
      run: |
        set -euo pipefail
        CACHE_BIN="${{ steps.cache-path.outputs.bin }}"
        INSTALL_DIR="${{ steps.install.outputs.install_dir }}"
        if [ "${{ steps.install.outputs.use_sudo }}" = "true" ]; then
          sudo install -m 0755 "${CACHE_BIN}" "${INSTALL_DIR}/wfctl"
        else
          install -m 0755 "${CACHE_BIN}" "${INSTALL_DIR}/wfctl"
        fi
    - name: Add install directory to PATH
      if: steps.install.outputs.use_sudo == 'false'
      shell: bash
      run: echo "${{ steps.install.outputs.install_dir }}" >> "$GITHUB_PATH"
    - name: Verify installation
      shell: bash
      run: wfctl version
